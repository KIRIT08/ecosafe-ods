<svg width="1600" height="1000" viewBox="0 0 1600 1000" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Diagrama de funcionamiento de EcoSafe ODS</title>
  <desc id="desc">Infografia que explica el flujo de EcoSafe ODS: usuario, frontend React, servicios Supabase, base de datos, autenticacion, modulos multimedia y despliegue.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#07131f"/>
      <stop offset="48%" stop-color="#0d2a2d"/>
      <stop offset="100%" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="green" x1="0" x2="1">
      <stop offset="0%" stop-color="#24d18b"/>
      <stop offset="100%" stop-color="#20b7ff"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff7a59"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .title { font: 800 54px Arial, sans-serif; fill: #f7fffb; letter-spacing: 0; }
      .subtitle { font: 500 25px Arial, sans-serif; fill: #b8d9d3; letter-spacing: 0; }
      .box-title { font: 800 28px Arial, sans-serif; fill: #f7fffb; letter-spacing: 0; }
      .box-text { font: 500 20px Arial, sans-serif; fill: #d7ece8; letter-spacing: 0; }
      .small { font: 600 17px Arial, sans-serif; fill: #b9d5d0; letter-spacing: 0; }
      .tag { font: 800 16px Arial, sans-serif; fill: #06131b; letter-spacing: 0; }
      .card { fill: rgba(12, 28, 38, 0.92); stroke: rgba(133, 255, 214, 0.32); stroke-width: 2; rx: 28; filter: url(#shadow); }
      .module { fill: rgba(11, 31, 38, 0.94); stroke: rgba(32, 183, 255, 0.32); stroke-width: 2; rx: 22; }
      .db { fill: rgba(19, 42, 56, 0.96); stroke: rgba(255, 209, 102, 0.55); stroke-width: 2; rx: 24; filter: url(#shadow); }
      .line { stroke: #46e6b0; stroke-width: 5; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrow); opacity: 0.9; }
      .line2 { stroke: #20b7ff; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; marker-end: url(#arrowBlue); opacity: 0.86; }
    </style>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#46e6b0"/>
    </marker>
    <marker id="arrowBlue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M2,2 L12,7 L2,12 Z" fill="#20b7ff"/>
    </marker>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="140" cy="130" r="115" fill="#24d18b" opacity="0.09"/>
  <circle cx="1450" cy="145" r="140" fill="#20b7ff" opacity="0.08"/>
  <circle cx="1350" cy="860" r="170" fill="#ffd166" opacity="0.07"/>
  <circle cx="260" cy="860" r="145" fill="#24d18b" opacity="0.07"/>

  <text x="90" y="90" class="title">EcoSafe ODS</text>
  <text x="92" y="132" class="subtitle">Plataforma web multimedia: conciencia, sostenibilidad y futuro</text>

  <g transform="translate(92,190)">
    <rect class="card" width="300" height="210"/>
    <circle cx="78" cy="76" r="42" fill="url(#green)" filter="url(#glow)"/>
    <path d="M72 94 C54 82 54 56 82 44 C104 36 124 48 124 72 C106 64 88 70 72 94Z" fill="#072217"/>
    <text x="38" y="148" class="box-title">Usuario</text>
    <text x="38" y="182" class="box-text">Navega, juega, aprende</text>
  </g>

  <g transform="translate(510,170)">
    <rect class="card" width="470" height="250"/>
    <text x="34" y="54" class="box-title">Frontend React + Vite</text>
    <text x="34" y="90" class="box-text">Interfaz visual, rutas protegidas, animaciones</text>
    <text x="34" y="124" class="box-text">Tailwind CSS, Framer Motion, Lucide React</text>
    <g transform="translate(34,154)">
      <rect width="132" height="34" rx="17" fill="url(#green)"/>
      <text x="21" y="23" class="tag">Dashboard</text>
      <rect x="148" width="88" height="34" rx="17" fill="#8cebd1"/>
      <text x="178" y="23" class="tag">Mapa</text>
      <rect x="252" width="112" height="34" rx="17" fill="#a6d9ff"/>
      <text x="280" y="23" class="tag">Canvas</text>
      <rect x="0" y="48" width="104" height="34" rx="17" fill="#ffd166"/>
      <text x="26" y="71" class="tag">Perfil</text>
      <rect x="120" y="48" width="126" height="34" rx="17" fill="#a8ffbf"/>
      <text x="143" y="71" class="tag">Biblioteca</text>
      <rect x="262" y="48" width="118" height="34" rx="17" fill="#ffb199"/>
      <text x="286" y="71" class="tag">Reportes</text>
    </g>
  </g>

  <g transform="translate(1115,170)">
    <rect class="db" width="390" height="250"/>
    <text x="34" y="54" class="box-title">Supabase Cloud</text>
    <text x="34" y="92" class="box-text">Auth real: registro, login y sesion</text>
    <text x="34" y="126" class="box-text">PostgreSQL: datos persistentes</text>
    <text x="34" y="160" class="box-text">Policies RLS para seguridad</text>
    <text x="34" y="194" class="box-text">Realtime opcional para ranking</text>
  </g>

  <path class="line" d="M392 295 C438 295 454 295 510 295"/>
  <path class="line" d="M980 295 C1035 295 1058 295 1115 295"/>
  <path class="line2" d="M1115 350 C1058 438 1030 476 960 535"/>
  <path class="line2" d="M747 420 C747 460 747 488 747 520"/>

  <g transform="translate(90,530)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Autenticacion</text>
    <text x="28" y="80" class="box-text">Login y registro reales</text>
    <text x="28" y="112" class="box-text">Perfil creado en Supabase</text>
  </g>

  <g transform="translate(450,530)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Dashboard ODS</text>
    <text x="28" y="80" class="box-text">Indicadores y graficos</text>
    <text x="28" y="112" class="box-text">Chart.js con data real</text>
  </g>

  <g transform="translate(810,530)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Mapa interactivo</text>
    <text x="28" y="80" class="box-text">Zonas de riesgo ODS</text>
    <text x="28" y="112" class="box-text">Leaflet + marcadores</text>
  </g>

  <g transform="translate(1170,530)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Videojuego Canvas</text>
    <text x="28" y="80" class="box-text">Misiones, niveles y sonidos</text>
    <text x="28" y="112" class="box-text">Puntajes guardados</text>
  </g>

  <g transform="translate(90,730)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Perfil gamificado</text>
    <text x="28" y="80" class="box-text">Nivel, puntos e insignias</text>
    <text x="28" y="112" class="box-text">Actividad del usuario</text>
  </g>

  <g transform="translate(450,730)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Biblioteca ODS</text>
    <text x="28" y="80" class="box-text">Contenido educativo</text>
    <text x="28" y="112" class="box-text">Fuentes oficiales en espanol</text>
  </g>

  <g transform="translate(810,730)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Reportes ODS</text>
    <text x="28" y="80" class="box-text">Impacto, hallazgos y mejoras</text>
    <text x="28" y="112" class="box-text">Compartir y descargar TXT</text>
  </g>

  <g transform="translate(1170,730)">
    <rect class="module" width="330" height="150"/>
    <text x="28" y="44" class="box-title">Despliegue</text>
    <text x="28" y="80" class="box-text">GitHub y Vercel</text>
    <text x="28" y="112" class="box-text">Variables de entorno</text>
  </g>

  <path class="line2" d="M255 420 C255 465 255 493 255 530"/>
  <path class="line2" d="M615 420 C615 465 615 493 615 530"/>
  <path class="line2" d="M975 420 C975 465 975 493 975 530"/>
  <path class="line2" d="M1335 420 C1335 465 1335 493 1335 530"/>

  <g transform="translate(90,925)">
    <rect x="0" y="0" width="1410" height="44" rx="22" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.12)"/>
    <text x="28" y="29" class="small">Flujo principal: Usuario -> React/Vite -> Servicios JS -> Supabase Auth/PostgreSQL -> Datos ODS -> Interfaz multimedia -> Vercel</text>
  </g>
</svg>
